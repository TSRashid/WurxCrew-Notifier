<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WurxOS Notifier</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; user-select: none;
    }
    .titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 0; -webkit-app-region: drag;
    }
    .titlebar h1 { font-size: 13px; font-weight: 600; color: #94a3b8; }
    .close-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: rgba(255,255,255,0.08);
      color: #94a3b8; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .close-btn:hover { background: #ef4444; color: #fff; }
    #loginView {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px 32px;
    }
    .logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #f5d5a8, #d4a574);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #0a0a0a; margin-bottom: 16px;
    }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #f1f5f9; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 24px; }
    .field { width: 100%; margin-bottom: 12px; }
    .field label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 2px solid #1e293b; background: #1e293b; color: #f1f5f9;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #f5d5a8; }
    .field input::placeholder { color: #475569; }
    .btn-login {
      width: 100%; padding: 11px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #f5d5a8, #d4a574);
      color: #0a0a0a; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
    #connectedView {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 32px; text-align: center;
    }
    .status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #22c55e; margin-bottom: 12px;
      box-shadow: 0 0 12px rgba(34,197,94,0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(34,197,94,0.5); }
      50% { box-shadow: 0 0 20px rgba(34,197,94,0.8); }
    }
    .connected-text { font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
    .connected-email { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .connected-count { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .connected-status { font-size: 10px; color: #475569; margin-bottom: 24px; }
    .btn-action {
      width: 100%; padding: 10px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 8px; transition: all 0.15s;
    }
    .btn-open-web { background: rgba(245,213,168,0.15); color: #f5d5a8; }
    .btn-open-web:hover { background: rgba(245,213,168,0.25); }
    .btn-logout { background: rgba(239,68,68,0.1); color: #f87171; }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>WurxOS Notifier</h1>
    <button class="close-btn" onclick="window.agent.hideWindow()">&#10005;</button>
  </div>

  <div id="loginView">
    <div class="logo">W</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to receive notifications</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div class="error" id="error"></div>
  </div>

  <div id="connectedView">
    <div class="status-dot"></div>
    <div class="connected-text">Connected &amp; Listening</div>
    <div class="connected-email" id="userEmail"></div>
    <div class="connected-count" id="unreadCount">0 unread notifications</div>
    <div class="connected-status" id="schedulerStatus">Scheduler: loading settings...</div>
    <button class="btn-action btn-open-web" onclick="window.agent.openWebApp()">Open WurxOS</button>
    <button class="btn-action btn-logout" id="logoutBtn">Sign Out</button>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDKARfT8Gzqr5sW7B_3Kl_pg2dasWScb7I",
      authDomain: "typecraft-e2qz7.firebaseapp.com",
      projectId: "typecraft-e2qz7",
      storageBucket: "typecraft-e2qz7.firebasestorage.app",
      messagingSenderId: "418684410971",
      appId: "1:418684410971:web:b9410a1355a63d50ccb37e"
    });

    var auth = firebase.auth();
    var db = firebase.firestore();
    var unsubFirestore = null;
    var unsubSettings = null;
    var schedulerInterval = null;
    var seenIds = new Set();
    var snoozedTimers = {};
    var currentUid = null;
    var currentRole = null;
    var userSettings = {};
    var lastFiredKeys = new Set(); // prevents duplicate fires within same minute

    function L(msg) { window.agent.log(msg); }
    function setStatus(msg) {
      var el = document.getElementById('schedulerStatus');
      if (el) el.textContent = 'Scheduler: ' + msg;
    }

    // ── Login ──────────────────────────────────────────────────────────────
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('email').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('password').focus(); });
    document.getElementById('logoutBtn').addEventListener('click', function() { auth.signOut(); });

    async function handleLogin() {
      var email = document.getElementById('email').value.trim();
      var pw = document.getElementById('password').value;
      var btn = document.getElementById('loginBtn');
      var err = document.getElementById('error');
      if (!email || !pw) { err.textContent = 'Enter email and password.'; return; }
      btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';
      L('handleLogin: ' + email);
      try {
        await auth.signInWithEmailAndPassword(email, pw);
        L('Login SUCCESS');
      } catch (e) {
        L('Login ERROR: ' + e.code + ' — ' + e.message);
        err.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    // ── Auth state ─────────────────────────────────────────────────────────
    auth.onAuthStateChanged(function(user) {
      L('onAuthStateChanged: ' + (user ? user.email : 'null'));
      if (user) {
        currentUid = user.uid;
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('connectedView').style.display = 'flex';
        document.getElementById('userEmail').textContent = user.email;
        window.agent.authStateChanged(true);
        startListening(user.uid);
        startSettingsSync(user.uid);
        startScheduler(user.uid);
      } else {
        currentUid = null;
        currentRole = null;
        userSettings = {};
        document.getElementById('loginView').style.display = 'flex';
        document.getElementById('connectedView').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').textContent = 'Sign In';
        window.agent.authStateChanged(false);
        stopAll();
      }
    });

    // ── Notification listener ──────────────────────────────────────────────
    function startListening(uid) {
      L('startListening: ' + uid);
      if (unsubFirestore) unsubFirestore();
      seenIds = new Set();
      var initialized = false;

      unsubFirestore = db.collection('notifications')
        .where('recipientId', '==', uid)
        .where('read', '==', false)
        .onSnapshot(function(snap) {
          var count = snap.size;
          document.getElementById('unreadCount').textContent = count + ' unread notification' + (count !== 1 ? 's' : '');
          window.agent.updateTooltip(count);
          if (!initialized) {
            snap.docs.forEach(function(d) { seenIds.add(d.id); });
            initialized = true;
            return;
          }
          snap.docChanges().forEach(function(change) {
            if (change.type === 'added' && !seenIds.has(change.doc.id)) {
              seenIds.add(change.doc.id);
              var data = change.doc.data();
              window.agent.showNotification({
                id: change.doc.id,
                title: data.title || 'New Notification',
                body: data.body || '',
                category: data.category || 'task',
                senderName: data.senderName || '',
                createdAt: data.createdAt && data.createdAt.toDate ? data.createdAt.toDate().getTime() : Date.now(),
              });
            }
          });
        }, function(error) {
          L('Notification listener ERROR: ' + error.code + ' — ' + error.message);
        });
    }

    // ── Settings sync (real-time) ──────────────────────────────────────────
    var unsubTeamUsers = null;

    var settingsLoaded = false; // true after first sync

    function campaignChanged(a, b) {
      if (!a && !b) return false;
      if (!a || !b) return true;
      return a.leadDays !== b.leadDays || a.time !== b.time || a.bossScope !== b.bossScope;
    }
    function tierChanged(a, b) {
      if (!a && !b) return false;
      if (!a || !b) return true;
      return a.enabled !== b.enabled || a.day1 !== b.day1 || a.time1 !== b.time1 || a.day2 !== b.day2 || a.time2 !== b.time2;
    }
    function clearKeysByPrefix(prefix) {
      var toDelete = [];
      lastFiredKeys.forEach(function(k) { if (k.startsWith(prefix)) toDelete.push(k); });
      toDelete.forEach(function(k) { lastFiredKeys.delete(k); });
      L('Cleared ' + toDelete.length + ' fired keys with prefix: ' + prefix);
    }

    function applySettings(data, source) {
      currentRole = data.role || null;
      var newSettings = {
        resetSchedule: data.resetSchedule || null,
        tierNotifications: data.tierNotifications || null,
        campaignReminder: data.campaignReminder || null,
      };

      if (settingsLoaded) {
        // Only clear fired keys for the specific type that actually changed
        if (campaignChanged(newSettings.campaignReminder, userSettings.campaignReminder)) {
          L('Campaign settings changed');
          clearKeysByPrefix('camp-');
        }
        if (tierChanged(newSettings.tierNotifications, userSettings.tierNotifications)) {
          L('Tier settings changed');
          clearKeysByPrefix('tier-');
        }
      }

      userSettings = newSettings;
      L('Settings synced (' + source + '): role=' + currentRole);
      setStatus('synced — ' + currentRole);

      if (settingsLoaded) {
        // Re-run scheduler only on actual settings changes (not initial load)
        if (currentUid) schedulerTick(currentUid);
      }
      settingsLoaded = true;
    }

    function startSettingsSync(uid) {
      L('startSettingsSync: ' + uid);
      if (unsubSettings) unsubSettings();
      if (unsubTeamUsers) { unsubTeamUsers(); unsubTeamUsers = null; }

      // Listen to users doc first
      var unsubUsers = db.collection('users').doc(uid).onSnapshot(function(snap) {
        if (snap.exists) {
          applySettings(snap.data(), 'users');
        } else if (!unsubTeamUsers) {
          // Not in users collection — listen to teamUsers (APC/IPC) in real-time
          unsubTeamUsers = db.collection('teamUsers').doc(uid).onSnapshot(function(tSnap) {
            if (tSnap.exists) {
              applySettings(tSnap.data(), 'teamUsers');
            }
          }, function(err) { L('teamUsers sync ERROR: ' + err.message); });
        }
      }, function(err) {
        L('Settings sync ERROR: ' + err.message);
      });

      unsubSettings = function() {
        if (unsubUsers) unsubUsers();
        if (unsubTeamUsers) { unsubTeamUsers(); unsubTeamUsers = null; }
      };
    }

    // ── Scheduler — runs every 60 seconds ─────────────────────────────────
    function startScheduler(uid) {
      L('startScheduler');
      if (schedulerInterval) clearInterval(schedulerInterval);
      // Run immediately + every 60s
      schedulerTick(uid);
      schedulerInterval = setInterval(function() { schedulerTick(uid); }, 60000);
    }

    async function schedulerTick(uid) {
      if (!uid || !currentRole) return;
      var now = new Date();
      var hhmm = pad2(now.getHours()) + ':' + pad2(now.getMinutes());
      L('── schedulerTick at ' + hhmm + ' ──');

      try {
        await checkTaskResets(uid, now);
      } catch(e) { L('taskReset error: ' + e.message); }

      try {
        await checkTierNotifications(uid, now);
      } catch(e) { L('tierNotif error: ' + e.message); }

      try {
        await checkCampaignReminders(uid, now);
      } catch(e) { L('campaignReminder error: ' + e.message); }

      try {
        await checkPersonalReminders(uid, now);
      } catch(e) { L('personalReminder error: ' + e.message); }
    }

    // ══════════════════════════════════════════════════════════════════════
    // TASK RESETS
    // ══════════════════════════════════════════════════════════════════════
    async function checkTaskResets(uid, now) {
      var rs = userSettings.resetSchedule;
      if (!rs) return;

      var daily = rs.daily || { time: '00:00' };
      var weekly = rs.weekly || { dayOfWeek: 1, time: '00:00' };
      var monthly = rs.monthly || { dayOfMonth: 1, time: '00:00' };

      // Load ALL brands + their tasks
      var brandSnap = await db.collection('brands').get();
      var allTasks = [];
      for (var i = 0; i < brandSnap.docs.length; i++) {
        var bid = brandSnap.docs[i].id;
        var tSnap = await db.collection('brands').doc(bid).collection('tasks').get();
        tSnap.docs.forEach(function(d) { allTasks.push({ ref: d.ref, data: d.data() }); });
      }
      // General tasks
      var gt1 = await db.collection('generalTasks').where('assigneeId', '==', uid).get().catch(function() { return { docs: [] }; });
      var gt2 = await db.collection('generalTasks').where('createdBy', '==', uid).get().catch(function() { return { docs: [] }; });
      var seenG = {};
      gt1.docs.forEach(function(d) { seenG[d.id] = true; allTasks.push({ ref: d.ref, data: d.data() }); });
      gt2.docs.forEach(function(d) { if (!seenG[d.id]) allTasks.push({ ref: d.ref, data: d.data() }); });

      var resetCount = 0;
      for (var j = 0; j < allTasks.length; j++) {
        var task = allTasks[j].data;
        var ref = allTasks[j].ref;
        if (!task.category || task.category === 'general') continue;
        var isMyTask = task.assigneeId === uid || (!task.assigneeId && task.createdBy === uid);
        if (!isMyTask) continue;
        if (task.status === 'todo') continue;

        var shouldReset = false;
        var sched = null;

        if (task.category === 'daily') {
          sched = daily;
          var prev = prevOccurrence('daily', daily, now);
          var lastReset = task.lastResetAt ? task.lastResetAt.toDate() : new Date(0);
          if (prev <= now && lastReset < prev) shouldReset = true;
        } else if (task.category === 'weekly') {
          sched = weekly;
          var prev = prevOccurrence('weekly', weekly, now);
          var lastReset = task.lastResetAt ? task.lastResetAt.toDate() : new Date(0);
          if (prev <= now && lastReset < prev) shouldReset = true;
        } else if (task.category === 'monthly') {
          sched = monthly;
          var prev = prevOccurrence('monthly', monthly, now);
          var lastReset = task.lastResetAt ? task.lastResetAt.toDate() : new Date(0);
          if (prev <= now && lastReset < prev) shouldReset = true;
        }

        // Guard: configured time must have passed TODAY before resetting
        if (shouldReset && sched) {
          var tp = (sched.time || '00:00').split(':');
          var todayAtTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(tp[0]) || 0, parseInt(tp[1]) || 0, 0, 0);
          if (now < todayAtTime) shouldReset = false;
        }

        if (shouldReset) {
          var nextReset = nextOccurrence(task.category, sched, now);
          await ref.update({
            status: 'todo',
            lastResetAt: firebase.firestore.Timestamp.fromDate(prevOccurrence(task.category, sched, now)),
            nextResetAt: nextReset ? firebase.firestore.Timestamp.fromDate(nextReset) : null,
          });
          resetCount++;
          L('Reset task: ' + task.title + ' → todo');
        }
      }
      if (resetCount > 0) L('Reset ' + resetCount + ' task(s)');
    }

    // ══════════════════════════════════════════════════════════════════════
    // TIER NOTIFICATIONS
    // ══════════════════════════════════════════════════════════════════════
    async function checkTierNotifications(uid, now) {
      var tn = userSettings.tierNotifications;
      if (!tn || !tn.enabled) return;
      if (!['boss', 'ol', 'tl', 'apc'].includes(currentRole)) return;

      var today = now.getDate();
      var month = now.getMonth();
      var year = now.getFullYear();
      var lastDay = new Date(year, month + 1, 0).getDate();

      var slots = [
        { idx: 1, day: Number(tn.day1), time: tn.time1 || '09:00' },
        { idx: 2, day: Number(tn.day2), time: tn.time2 || '18:00' },
      ];

      for (var i = 0; i < slots.length; i++) {
        var s = slots[i];
        if (!s.day || s.day < 1 || s.day > 31) continue;
        var effDay = Math.min(s.day, lastDay);

        // If today hasn't reached the configured day yet, skip
        if (today < effDay) continue;

        // Configured day has arrived or passed — only fire at the configured time TODAY
        var parts = s.time.split(':');
        var todayTarget = new Date(year, month, today, parseInt(parts[0]) || 0, parseInt(parts[1]) || 0, 0, 0);
        if (now < todayTarget) continue;

        var firedKey = 'tier-' + year + '-' + (month+1) + '-' + s.idx;
        if (lastFiredKeys.has(firedKey)) continue;

        // Load matching brands
        var brands = await loadTierBrands(uid);
        if (brands.length === 0) { lastFiredKeys.add(firedKey); continue; }

        var preview = brands.slice(0, 3).map(function(b) { return b.brandName + ' (' + b.tier + ')'; }).join(', ');
        var extra = brands.length > 3 ? ' +' + (brands.length - 3) + ' more' : '';
        var daysLeft = Math.max(0, lastDay - today);
        var title = daysLeft <= 1 ? 'Month ending — generate tier sales' : 'Tier reminder: ' + daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + ' left';
        var body = brands.length + ' brand' + (brands.length === 1 ? '' : 's') + ' need sale generation — ' + preview + extra;

        await db.collection('notifications').add({
          recipientId: uid, senderId: 'system', senderName: 'Tier Tracker',
          category: 'tier', action: 'reminder', title: title, body: body,
          read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        lastFiredKeys.add(firedKey);
        L('Tier notification fired: slot ' + s.idx);
      }
    }

    async function loadTierBrands(uid) {
      var snap = await db.collection('brands').get();
      return snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); }).filter(function(b) {
        if (!b.tier || b.tier.toLowerCase() === 'unlimited') return false;
        if (currentRole === 'boss' || currentRole === 'ol') return true;
        if (currentRole === 'tl') return b.ownerId === uid;
        if (currentRole === 'apc') return (b.assignedUsers || []).some(function(u) { return u.id === uid; });
        return false;
      });
    }

    // ══════════════════════════════════════════════════════════════════════
    // CAMPAIGN REMINDERS
    // ══════════════════════════════════════════════════════════════════════
    async function checkCampaignReminders(uid, now) {
      var cr = userSettings.campaignReminder || { leadDays: 2, time: '09:00', bossScope: 'mine' };
      var leadDays = cr.leadDays != null ? cr.leadDays : 2;
      var parts = (cr.time || '09:00').split(':');
      var rH = parseInt(parts[0]) || 0;
      var rM = parseInt(parts[1]) || 0;
      var MS_DAY = 86400000;

      // Load campaigns relevant to this user
      var campaigns = [];
      if (currentRole === 'apc') {
        // Load user's assigned brand IDs
        var profileSnap = await db.collection('teamUsers').doc(uid).get().catch(function() { return { exists: false }; });
        var assignedIds = [];
        if (profileSnap.exists) {
          assignedIds = (profileSnap.data().assignedBrands || []).map(function(b) { return b.id; }).filter(Boolean);
        }
        if (assignedIds.length > 0) {
          // Firestore 'in' supports max 30
          for (var ci = 0; ci < assignedIds.length; ci += 30) {
            var chunk = assignedIds.slice(ci, ci + 30);
            var cSnap = await db.collection('campaigns').where('brandId', 'in', chunk).get();
            cSnap.docs.forEach(function(d) { campaigns.push(Object.assign({ id: d.id, ref: d.ref }, d.data())); });
          }
        }
      } else if (currentRole === 'tl') {
        var cSnap = await db.collection('campaigns').where('ownerId', '==', uid).get();
        campaigns = cSnap.docs.map(function(d) { return Object.assign({ id: d.id, ref: d.ref }, d.data()); });
      } else if (currentRole === 'boss') {
        if (cr.bossScope === 'all') {
          var cSnap = await db.collection('campaigns').get();
          campaigns = cSnap.docs.map(function(d) { return Object.assign({ id: d.id, ref: d.ref }, d.data()); });
        } else {
          var cSnap = await db.collection('campaigns').where('addedBy', '==', uid).get();
          campaigns = cSnap.docs.map(function(d) { return Object.assign({ id: d.id, ref: d.ref }, d.data()); });
        }
      }

      for (var k = 0; k < campaigns.length; k++) {
        var c = campaigns[k];
        if (c.status !== 'Ongoing' && c.status !== 'Upcoming') continue;
        if (!c.endTime) continue;

        var endDate = c.endTime.toDate ? c.endTime.toDate() : new Date(c.endTime);
        if (now >= endDate) continue; // already ended

        // Compute reminder date (without time)
        var reminderDate = new Date(endDate.getTime() - leadDays * MS_DAY);
        reminderDate.setHours(0, 0, 0, 0);
        var todayMidnight = new Date(now); todayMidnight.setHours(0, 0, 0, 0);
        if (todayMidnight < reminderDate) continue; // reminder date hasn't arrived yet

        // Reminder date has arrived or passed — but only fire at the configured time TODAY
        var todayAtTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), rH, rM, 0, 0);
        if (now < todayAtTime) continue; // configured time hasn't come yet today

        var firedKey = 'camp-' + c.id;
        if (lastFiredKeys.has(firedKey)) continue;

        // Fire notification (no Firestore-level dedup — re-fires after settings change)
        var dMs = endDate - now;
        var dHours = Math.floor(dMs / 3600000);
        var relText = dHours < 24 ? (dHours <= 1 ? 'in less than an hour' : 'in ' + dHours + ' hours') :
          (Math.floor(dHours / 24) === 1 ? 'tomorrow' : 'in ' + Math.floor(dHours / 24) + ' days');

        await db.collection('notifications').add({
          recipientId: uid, senderId: 'system', senderName: 'Campaign Tracker',
          category: 'campaign', action: 'reminder',
          title: 'Campaign ending: "' + (c.promotionName || 'Untitled') + '"',
          body: (c.brandName ? '[' + c.brandName + '] ' : '') + '"' + (c.promotionName || 'Untitled') + '" ends ' + relText + '.',
          read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          brandId: c.brandId || null, brandName: c.brandName || '',
        });
        lastFiredKeys.add(firedKey);
        L('Campaign reminder fired: ' + c.promotionName);
      }
    }

    // ══════════════════════════════════════════════════════════════════════
    // PERSONAL REMINDERS
    // ══════════════════════════════════════════════════════════════════════
    async function checkPersonalReminders(uid, now) {
      var snap = await db.collection('reminders')
        .where('userId', '==', uid)
        .where('triggered', '==', false)
        .get();

      for (var i = 0; i < snap.docs.length; i++) {
        var doc = snap.docs[i];
        var data = doc.data();
        if (!data.dueAt) continue;
        var dueDate = data.dueAt.toDate ? data.dueAt.toDate() : new Date(data.dueAt);
        if (now < dueDate) continue;

        var firedKey = 'reminder-' + doc.id;
        if (lastFiredKeys.has(firedKey)) continue;

        // Mark as triggered
        await doc.ref.update({ triggered: true });

        // Create a notification so user gets a desktop popup
        await db.collection('notifications').add({
          recipientId: uid, senderId: 'system', senderName: 'Reminder',
          category: 'reminder', action: 'due',
          title: data.title || 'Reminder',
          body: data.description || 'Your reminder is due.',
          read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        lastFiredKeys.add(firedKey);
        L('Personal reminder fired: ' + (data.title || doc.id));
      }
    }

    // ══════════════════════════════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════════════════════════════
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function prevOccurrence(category, sched, now) {
      var parts = (sched.time || '00:00').split(':');
      var h = parseInt(parts[0]) || 0;
      var m = parseInt(parts[1]) || 0;

      if (category === 'daily') {
        var c = new Date(now); c.setHours(h, m, 0, 0);
        if (c > now) c.setDate(c.getDate() - 1);
        return c;
      }
      if (category === 'weekly') {
        var dow = sched.dayOfWeek != null ? sched.dayOfWeek : 1;
        var cur = now.getDay();
        var back = (cur - dow + 7) % 7;
        var c = new Date(now); c.setDate(now.getDate() - back); c.setHours(h, m, 0, 0);
        if (c > now) c.setDate(c.getDate() - 7);
        return c;
      }
      if (category === 'monthly') {
        var dom = sched.dayOfMonth != null ? sched.dayOfMonth : 1;
        var c = new Date(now); c.setDate(dom); c.setHours(h, m, 0, 0);
        if (c > now) c.setMonth(c.getMonth() - 1);
        return c;
      }
      return null;
    }

    function nextOccurrence(category, sched, now) {
      var parts = (sched.time || '00:00').split(':');
      var h = parseInt(parts[0]) || 0;
      var m = parseInt(parts[1]) || 0;

      if (category === 'daily') {
        var c = new Date(now); c.setHours(h, m, 0, 0);
        if (c <= now) c.setDate(c.getDate() + 1);
        return c;
      }
      if (category === 'weekly') {
        var dow = sched.dayOfWeek != null ? sched.dayOfWeek : 1;
        var cur = now.getDay();
        var ahead = (dow - cur + 7) % 7;
        if (ahead === 0) {
          var same = new Date(now); same.setHours(h, m, 0, 0);
          if (same <= now) ahead = 7;
        }
        var c = new Date(now); c.setDate(now.getDate() + ahead); c.setHours(h, m, 0, 0);
        return c;
      }
      if (category === 'monthly') {
        var dom = sched.dayOfMonth != null ? sched.dayOfMonth : 1;
        var c = new Date(now); c.setDate(dom); c.setHours(h, m, 0, 0);
        if (c <= now) c.setMonth(c.getMonth() + 1);
        return c;
      }
      return null;
    }

    // ── Cleanup ────────────────────────────────────────────────────────────
    function stopAll() {
      if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
      if (unsubSettings) { unsubSettings(); unsubSettings = null; }
      if (unsubTeamUsers) { unsubTeamUsers(); unsubTeamUsers = null; }
      if (schedulerInterval) { clearInterval(schedulerInterval); schedulerInterval = null; }
      Object.values(snoozedTimers).forEach(function(t) { clearTimeout(t); });
      snoozedTimers = {};
      lastFiredKeys.clear();
      settingsLoaded = false;
    }

    // ── IPC handlers ───────────────────────────────────────────────────────
    window.agent.onMarkRead(function(notifId) {
      db.collection('notifications').doc(notifId).update({ read: true }).catch(function(err) {
        console.error('Failed to mark read:', err);
      });
    });

    window.agent.onSnoozeRequest(function(data) {
      var notifId = data.notifId;
      var minutes = data.minutes;
      if (snoozedTimers[notifId]) clearTimeout(snoozedTimers[notifId]);
      snoozedTimers[notifId] = setTimeout(async function() {
        delete snoozedTimers[notifId];
        try {
          var snap = await db.collection('notifications').doc(notifId).get();
          if (snap.exists && !snap.data().read) {
            var d = snap.data();
            window.agent.showNotification({
              id: snap.id, title: d.title || 'Snoozed', body: d.body || '',
              category: d.category || 'task', senderName: d.senderName || '',
              createdAt: d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().getTime() : Date.now(),
              snoozed: true,
            });
          }
        } catch(err) {}
      }, minutes * 60 * 1000);
    });
  </script>
