<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WurxOS Notifier</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; user-select: none;
    }
    .titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 0; -webkit-app-region: drag;
    }
    .titlebar h1 { font-size: 13px; font-weight: 600; color: #94a3b8; }
    .close-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: rgba(255,255,255,0.08);
      color: #94a3b8; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .close-btn:hover { background: #ef4444; color: #fff; }
    #loginView {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px 32px;
    }
    .logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #f5d5a8, #d4a574);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #0a0a0a; margin-bottom: 16px;
    }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #f1f5f9; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 24px; }
    .field { width: 100%; margin-bottom: 12px; }
    .field label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 2px solid #1e293b; background: #1e293b; color: #f1f5f9;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #f5d5a8; }
    .field input::placeholder { color: #475569; }
    .btn-login {
      width: 100%; padding: 11px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #f5d5a8, #d4a574);
      color: #0a0a0a; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
    #connectedView {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 32px; text-align: center;
    }
    .status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #22c55e; margin-bottom: 12px;
      box-shadow: 0 0 12px rgba(34,197,94,0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(34,197,94,0.5); }
      50% { box-shadow: 0 0 20px rgba(34,197,94,0.8); }
    }
    .connected-text { font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
    .connected-email { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .connected-count { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .connected-status { font-size: 10px; color: #475569; margin-bottom: 24px; }
    .btn-action {
      width: 100%; padding: 10px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 8px; transition: all 0.15s;
    }
    .btn-open-web { background: rgba(245,213,168,0.15); color: #f5d5a8; }
    .btn-open-web:hover { background: rgba(245,213,168,0.25); }
    .btn-logout { background: rgba(239,68,68,0.1); color: #f87171; }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>WurxOS Notifier</h1>
    <button class="close-btn" onclick="window.agent.hideWindow()">&#10005;</button>
  </div>

  <div id="loginView">
    <div class="logo">W</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to receive notifications</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div class="error" id="error"></div>
  </div>

  <div id="connectedView">
    <div class="status-dot"></div>
    <div class="connected-text">Connected &amp; Listening</div>
    <div class="connected-email" id="userEmail"></div>
    <div class="connected-count" id="unreadCount">0 unread notifications</div>
    <div class="connected-status" id="schedulerStatus">Scheduler: loading settings...</div>
    <button class="btn-action btn-open-web" onclick="window.agent.openWebApp()">Open WurxOS</button>
    <button class="btn-action btn-logout" id="logoutBtn">Sign Out</button>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDKARfT8Gzqr5sW7B_3Kl_pg2dasWScb7I",
      authDomain: "typecraft-e2qz7.firebaseapp.com",
      projectId: "typecraft-e2qz7",
      storageBucket: "typecraft-e2qz7.firebasestorage.app",
      messagingSenderId: "418684410971",
      appId: "1:418684410971:web:b9410a1355a63d50ccb37e"
    });

    var auth = firebase.auth();
    var db = firebase.firestore();
    var unsubFirestore = null;
    var schedulerInterval = null;
    var seenIds = new Set();
    var snoozedTimers = {};
    var currentUid = null;
    var currentRole = null;
    var userSettings = {};     // in-memory copy of local settings
    var lastFiredKeys = new Set();

    function L(msg) { window.agent.log(msg); }
    function setStatus(msg) {
      var el = document.getElementById('schedulerStatus');
      if (el) el.textContent = 'Scheduler: ' + msg;
    }

    // ── Login ──────────────────────────────────────────────────────────────
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('email').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('password').focus(); });
    document.getElementById('logoutBtn').addEventListener('click', function() { auth.signOut(); });

    async function handleLogin() {
      var email = document.getElementById('email').value.trim();
      var pw = document.getElementById('password').value;
      var btn = document.getElementById('loginBtn');
      var err = document.getElementById('error');
      if (!email || !pw) { err.textContent = 'Enter email and password.'; return; }
      btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';
      L('handleLogin: ' + email);
      try {
        await auth.signInWithEmailAndPassword(email, pw);
        L('Login SUCCESS');
      } catch (e) {
        L('Login ERROR: ' + e.code + ' — ' + e.message);
        err.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    // ── Auth state ─────────────────────────────────────────────────────────
    auth.onAuthStateChanged(async function(user) {
      L('onAuthStateChanged: ' + (user ? user.email : 'null'));
      if (user) {
        currentUid = user.uid;
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('connectedView').style.display = 'flex';
        document.getElementById('userEmail').textContent = user.email;
        window.agent.authStateChanged(true);

        // Load role from Firestore ONCE (needed for permission checks)
        await loadRoleOnce(user.uid);

        // Load settings from local storage
        await loadLocalSettings();

        // Start notification listener (this is the ONLY onSnapshot we keep)
        startListening(user.uid);

        // Start scheduler
        startScheduler(user.uid);
      } else {
        currentUid = null;
        currentRole = null;
        userSettings = {};
        document.getElementById('loginView').style.display = 'flex';
        document.getElementById('connectedView').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').textContent = 'Sign In';
        window.agent.authStateChanged(false);
        stopAll();
      }
    });

    // ── Load role once from Firestore ──────────────────────────────────────
    async function loadRoleOnce(uid) {
      try {
        var snap = await db.collection('users').doc(uid).get();
        if (snap.exists) {
          currentRole = snap.data().role || null;
        } else {
          var tSnap = await db.collection('teamUsers').doc(uid).get();
          if (tSnap.exists) currentRole = tSnap.data().role || null;
        }
        // Save role locally
        await window.agent.storeSet('role', currentRole);
        L('Role loaded: ' + currentRole);
      } catch (e) {
        // Fallback to local
        currentRole = await window.agent.storeGet('role');
        L('Role from local fallback: ' + currentRole);
      }
    }

    // ── Load settings from local storage ──────────────────────────────────
    async function loadLocalSettings() {
      var stored = await window.agent.storeGet('settings');
      if (stored) {
        userSettings = stored;
        L('Settings loaded from local: ' + JSON.stringify(Object.keys(stored)));
        setStatus('local settings loaded — ' + currentRole);
      } else {
        userSettings = {};
        L('No local settings found — waiting for web app to send settings');
        setStatus('waiting for settings — ' + currentRole);
      }
    }

    // ── WebSocket settings relay from main process ────────────────────────
    function clearKeysByPrefix(prefix) {
      var toDelete = [];
      lastFiredKeys.forEach(function(k) { if (k.startsWith(prefix)) toDelete.push(k); });
      toDelete.forEach(function(k) { lastFiredKeys.delete(k); });
      L('Cleared ' + toDelete.length + ' fired keys with prefix: ' + prefix);
    }

    // When web app sends settings via WebSocket → main.js → here
    window.agent.onWsSettingsUpdate(function(msg) {
      var key = msg.key;
      var data = msg.data;
      L('Settings update from WebSocket: ' + key);

      // Clear fired keys for the changed type
      if (key === 'campaignReminder') clearKeysByPrefix('camp-');
      if (key === 'tierNotifications') clearKeysByPrefix('tier-');
      if (key === 'productCampaignReminder') clearKeysByPrefix('prodcamp-');
      if (key === 'resetSchedule') clearKeysByPrefix('reset-');
      if (key === 'personalReminders') clearKeysByPrefix('reminder-');

      // Update in-memory settings
      userSettings[key] = data;
      setStatus('settings updated — ' + key);

      // Re-run scheduler immediately
      if (currentUid) schedulerTick(currentUid);
    });

    // When web app sends auth info
    window.agent.onWsAuth(function(msg) {
      if (msg.role && msg.role !== currentRole) {
        currentRole = msg.role;
        L('Role updated from WebSocket: ' + currentRole);
      }
    });

    // ── Notification listener (ONLY onSnapshot we keep) ───────────────────
    function startListening(uid) {
      L('startListening: ' + uid);
      if (unsubFirestore) unsubFirestore();
      seenIds = new Set();
      var initialized = false;

      unsubFirestore = db.collection('notifications')
        .where('recipientId', '==', uid)
        .where('read', '==', false)
        .onSnapshot(function(snap) {
          var count = snap.size;
          document.getElementById('unreadCount').textContent = count + ' unread notification' + (count !== 1 ? 's' : '');
          window.agent.updateTooltip(count);
          if (!initialized) {
            snap.docs.forEach(function(d) { seenIds.add(d.id); });
            initialized = true;
            return;
          }
          snap.docChanges().forEach(function(change) {
            if (change.type === 'added' && !seenIds.has(change.doc.id)) {
              seenIds.add(change.doc.id);
              var data = change.doc.data();
              window.agent.showNotification({
                id: change.doc.id,
                title: data.title || 'New Notification',
                body: data.body || '',
                category: data.category || 'task',
                senderName: data.senderName || '',
                recipientId: data.recipientId || '',
                createdAt: data.createdAt && data.createdAt.toDate ? data.createdAt.toDate().getTime() : Date.now(),
              });
            }
          });
        }, function(error) {
          L('Notification listener ERROR: ' + error.code + ' — ' + error.message);
        });
    }

    // ── Scheduler — checks LOCAL settings every 60 seconds ────────────────
    function startScheduler(uid) {
      L('startScheduler');
      if (schedulerInterval) clearInterval(schedulerInterval);
      schedulerTick(uid);
      schedulerInterval = setInterval(function() { schedulerTick(uid); }, 60000);
    }

    async function schedulerTick(uid) {
      if (!uid || !currentRole) return;
      var now = new Date();
      var hhmm = pad2(now.getHours()) + ':' + pad2(now.getMinutes());
      L('── schedulerTick at ' + hhmm + ' ──');

      // All checks read from LOCAL userSettings, only hit Firestore at trigger time
      try { await checkTaskResets(uid, now); }
      catch(e) { L('taskReset error: ' + e.message); }

      try { await checkTierNotifications(uid, now); }
      catch(e) { L('tierNotif error: ' + e.message); }

      try { await checkCampaignReminders(uid, now); }
      catch(e) { L('campaignReminder error: ' + e.message); }

      try { await checkPersonalReminders(uid, now); }
      catch(e) { L('personalReminder error: ' + e.message); }

      try { await checkProductCampaigns(uid, now); }
      catch(e) { L('productCampaign error: ' + e.message); }
    }

    // ══════════════════════════════════════════════════════════════════════
    // TASK RESETS — reads local settings, hits Firestore ONLY to reset tasks
    // ══════════════════════════════════════════════════════════════════════
    async function checkTaskResets(uid, now) {
      var rs = userSettings.resetSchedule;
      if (!rs) return;

      var daily = rs.daily || { time: '00:00' };
      var weekly = rs.weekly || { dayOfWeek: 1, time: '00:00' };
      var monthly = rs.monthly || { dayOfMonth: 1, time: '00:00' };

      // Check if any schedule is due — if not, return early (no Firestore call)
      var dailyDue = isScheduleDue('daily', daily, now);
      var weeklyDue = isScheduleDue('weekly', weekly, now);
      var monthlyDue = isScheduleDue('monthly', monthly, now);

      if (!dailyDue && !weeklyDue && !monthlyDue) return;

      L('Task reset due — fetching tasks from Firestore');

      // Use collectionGroup to fetch only the current user's brand tasks in
      // two queries (assignee + creator) instead of scanning every brand.
      var cgAssigned = await db.collectionGroup('tasks').where('assigneeId', '==', uid).get().catch(function() { return { docs: [] }; });
      var cgCreated  = await db.collectionGroup('tasks').where('createdBy', '==', uid).get().catch(function() { return { docs: [] }; });
      var gt1 = await db.collection('generalTasks').where('assigneeId', '==', uid).get().catch(function() { return { docs: [] }; });
      var gt2 = await db.collection('generalTasks').where('createdBy', '==', uid).get().catch(function() { return { docs: [] }; });

      var seen = {};
      var allTasks = [];
      function push(d) {
        if (seen[d.ref.path]) return;
        seen[d.ref.path] = true;
        allTasks.push({ ref: d.ref, data: d.data() });
      }
      cgAssigned.docs.forEach(push);
      cgCreated.docs.forEach(push);
      gt1.docs.forEach(push);
      gt2.docs.forEach(push);

      var resetCount = 0;
      for (var j = 0; j < allTasks.length; j++) {
        var task = allTasks[j].data;
        var ref = allTasks[j].ref;
        if (!task.category || task.category === 'general') continue;
        var isMyTask = task.assigneeId === uid || (!task.assigneeId && task.createdBy === uid);
        if (!isMyTask) continue;
        if (task.status === 'todo') continue;

        var shouldReset = false;
        var sched = null;

        if (task.category === 'daily' && dailyDue) {
          sched = daily;
          var prev = prevOccurrence('daily', daily, now);
          var lastReset = task.lastResetAt ? task.lastResetAt.toDate() : new Date(0);
          if (prev <= now && lastReset < prev) shouldReset = true;
        } else if (task.category === 'weekly' && weeklyDue) {
          sched = weekly;
          var prev = prevOccurrence('weekly', weekly, now);
          var lastReset = task.lastResetAt ? task.lastResetAt.toDate() : new Date(0);
          if (prev <= now && lastReset < prev) shouldReset = true;
        } else if (task.category === 'monthly' && monthlyDue) {
          sched = monthly;
          var prev = prevOccurrence('monthly', monthly, now);
          var lastReset = task.lastResetAt ? task.lastResetAt.toDate() : new Date(0);
          if (prev <= now && lastReset < prev) shouldReset = true;
        }

        if (shouldReset) {
          var nextReset = nextOccurrence(task.category, sched, now);
          await ref.update({
            status: 'todo',
            lastResetAt: firebase.firestore.Timestamp.fromDate(prevOccurrence(task.category, sched, now)),
            nextResetAt: nextReset ? firebase.firestore.Timestamp.fromDate(nextReset) : null,
          });
          resetCount++;
          L('Reset task: ' + task.title + ' → todo');
        }
      }
      if (resetCount > 0) L('Reset ' + resetCount + ' task(s)');
    }

    // Returns true if the schedule time has passed today and hasn't been fired yet
    function isScheduleDue(category, sched, now) {
      var tp = (sched.time || '00:00').split(':');
      var todayAtTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(tp[0]) || 0, parseInt(tp[1]) || 0, 0, 0);
      if (now < todayAtTime) return false;

      var firedKey = 'reset-' + category + '-' + now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();
      if (lastFiredKeys.has(firedKey)) return false;

      // For weekly, check day of week
      if (category === 'weekly') {
        var dow = sched.dayOfWeek != null ? sched.dayOfWeek : 1;
        if (now.getDay() !== dow) return false;
      }
      // For monthly, check day of month
      if (category === 'monthly') {
        var dom = sched.dayOfMonth != null ? sched.dayOfMonth : 1;
        var lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        if (now.getDate() !== Math.min(dom, lastDay)) return false;
      }

      lastFiredKeys.add(firedKey);
      return true;
    }

    // ══════════════════════════════════════════════════════════════════════
    // TIER NOTIFICATIONS — local settings, Firestore only at trigger time
    // ══════════════════════════════════════════════════════════════════════
    async function checkTierNotifications(uid, now) {
      var tn = userSettings.tierNotifications;
      if (!tn || !tn.enabled) return;
      if (!['boss', 'ol', 'tl', 'apc'].includes(currentRole)) return;

      var today = now.getDate();
      var month = now.getMonth();
      var year = now.getFullYear();
      var lastDay = new Date(year, month + 1, 0).getDate();

      var slots = [
        { idx: 1, day: Number(tn.day1), time: tn.time1 || '09:00' },
        { idx: 2, day: Number(tn.day2), time: tn.time2 || '18:00' },
      ];

      for (var i = 0; i < slots.length; i++) {
        var s = slots[i];
        if (!s.day || s.day < 1 || s.day > 31) continue;
        var effDay = Math.min(s.day, lastDay);
        if (today < effDay) continue;

        var parts = s.time.split(':');
        var todayTarget = new Date(year, month, today, parseInt(parts[0]) || 0, parseInt(parts[1]) || 0, 0, 0);
        if (now < todayTarget) continue;

        var firedKey = 'tier-' + year + '-' + (month+1) + '-' + s.idx;
        if (lastFiredKeys.has(firedKey)) continue;

        // NOW hit Firestore for brand data
        L('Tier notification due — fetching brands from Firestore');
        var brands = await loadTierBrands(uid);
        if (brands.length === 0) { lastFiredKeys.add(firedKey); continue; }

        var preview = brands.slice(0, 3).map(function(b) { return b.brandName + ' (' + b.tier + ')'; }).join(', ');
        var extra = brands.length > 3 ? ' +' + (brands.length - 3) + ' more' : '';
        var daysLeft = Math.max(0, lastDay - today);
        var title = daysLeft <= 1 ? 'Month ending — generate tier sales' : 'Tier reminder: ' + daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + ' left';
        var body = brands.length + ' brand' + (brands.length === 1 ? '' : 's') + ' need sale generation — ' + preview + extra;

        await db.collection('notifications').add({
          recipientId: uid, senderId: 'system', senderName: 'Tier Tracker',
          category: 'tier', action: 'reminder', title: title, body: body,
          read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        lastFiredKeys.add(firedKey);
        L('Tier notification fired: slot ' + s.idx);
      }
    }

    async function loadTierBrands(uid) {
      // Scope query to role: TL only needs their own brands
      var ref = db.collection('brands');
      var snap;
      if (currentRole === 'tl' || currentRole === 'pctl') {
        snap = await ref.where('ownerId', '==', uid).get();
      } else {
        snap = await ref.get();
      }
      return snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); }).filter(function(b) {
        if (!b.tier || b.tier.toLowerCase() === 'unlimited') return false;
        if (currentRole === 'boss' || currentRole === 'ol') return true;
        if (currentRole === 'tl' || currentRole === 'pctl') return true; // already filtered server-side
        if (currentRole === 'apc' || currentRole === 'ipc') return (b.assignedUsers || []).some(function(u) { return u.id === uid; });
        return false;
      });
    }

    // ══════════════════════════════════════════════════════════════════════
    // CAMPAIGN REMINDERS — local settings, Firestore at trigger time
    // ══════════════════════════════════════════════════════════════════════
    async function checkCampaignReminders(uid, now) {
      var cr = userSettings.campaignReminder || { leadDays: 2, time: '09:00', bossScope: 'mine' };
      var leadDays = cr.leadDays != null ? cr.leadDays : 2;
      var parts = (cr.time || '09:00').split(':');
      var rH = parseInt(parts[0]) || 0;
      var rM = parseInt(parts[1]) || 0;

      // Time check — don't hit Firestore until configured time
      var todayAtTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), rH, rM, 0, 0);
      if (now < todayAtTime) return;

      // Check if already fired today
      var dailyKey = 'camp-check-' + now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();
      if (lastFiredKeys.has(dailyKey)) return;

      L('Campaign reminder due — fetching campaigns from Firestore');
      var MS_DAY = 86400000;

      // NOW hit Firestore
      var campaigns = [];
      if (currentRole === 'apc') {
        var profileSnap = await db.collection('teamUsers').doc(uid).get().catch(function() { return { exists: false }; });
        var assignedIds = [];
        if (profileSnap.exists) {
          assignedIds = (profileSnap.data().assignedBrands || []).map(function(b) { return b.id; }).filter(Boolean);
        }
        if (assignedIds.length > 0) {
          for (var ci = 0; ci < assignedIds.length; ci += 30) {
            var chunk = assignedIds.slice(ci, ci + 30);
            var cSnap = await db.collection('campaigns').where('brandId', 'in', chunk).get();
            cSnap.docs.forEach(function(d) { campaigns.push(Object.assign({ id: d.id, ref: d.ref }, d.data())); });
          }
        }
      } else if (currentRole === 'tl') {
        var cSnap = await db.collection('campaigns').where('ownerId', '==', uid).get();
        campaigns = cSnap.docs.map(function(d) { return Object.assign({ id: d.id, ref: d.ref }, d.data()); });
      } else if (currentRole === 'boss') {
        if (cr.bossScope === 'all') {
          var cSnap = await db.collection('campaigns').get();
          campaigns = cSnap.docs.map(function(d) { return Object.assign({ id: d.id, ref: d.ref }, d.data()); });
        } else {
          var cSnap = await db.collection('campaigns').where('addedBy', '==', uid).get();
          campaigns = cSnap.docs.map(function(d) { return Object.assign({ id: d.id, ref: d.ref }, d.data()); });
        }
      }

      var firedAny = false;
      for (var k = 0; k < campaigns.length; k++) {
        var c = campaigns[k];
        if (c.status !== 'Ongoing' && c.status !== 'Upcoming') continue;
        if (!c.endTime) continue;

        var endDate = c.endTime.toDate ? c.endTime.toDate() : new Date(c.endTime);
        if (now >= endDate) continue;

        var reminderDate = new Date(endDate.getTime() - leadDays * MS_DAY);
        reminderDate.setHours(0, 0, 0, 0);
        var todayMidnight = new Date(now); todayMidnight.setHours(0, 0, 0, 0);
        if (todayMidnight < reminderDate) continue;

        var firedKey = 'camp-' + c.id;
        if (lastFiredKeys.has(firedKey)) continue;

        var dMs = endDate - now;
        var dHours = Math.floor(dMs / 3600000);
        var relText = dHours < 24 ? (dHours <= 1 ? 'in less than an hour' : 'in ' + dHours + ' hours') :
          (Math.floor(dHours / 24) === 1 ? 'tomorrow' : 'in ' + Math.floor(dHours / 24) + ' days');

        await db.collection('notifications').add({
          recipientId: uid, senderId: 'system', senderName: 'Campaign Tracker',
          category: 'campaign', action: 'reminder',
          title: 'Campaign ending: "' + (c.promotionName || 'Untitled') + '"',
          body: (c.brandName ? '[' + c.brandName + '] ' : '') + '"' + (c.promotionName || 'Untitled') + '" ends ' + relText + '.',
          read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          brandId: c.brandId || null, brandName: c.brandName || '',
        });
        lastFiredKeys.add(firedKey);
        firedAny = true;
        L('Campaign reminder fired: ' + c.promotionName);
      }
      lastFiredKeys.add(dailyKey);
    }

    // ══════════════════════════════════════════════════════════════════════
    // PERSONAL REMINDERS — reads LOCAL list pushed by web app over WebSocket,
    // hits Firestore ONLY when a reminder actually fires
    // ══════════════════════════════════════════════════════════════════════
    async function checkPersonalReminders(uid, now) {
      var list = userSettings.personalReminders;
      if (!list || !list.length) return;

      var nowMs = now.getTime();
      for (var i = 0; i < list.length; i++) {
        var r = list[i];
        if (!r || !r.id || r.dueAt == null) continue;
        var dueMs = typeof r.dueAt === 'number' ? r.dueAt : new Date(r.dueAt).getTime();
        if (isNaN(dueMs) || nowMs < dueMs) continue;

        var firedKey = 'reminder-' + r.id;
        if (lastFiredKeys.has(firedKey)) continue;

        try {
          await db.collection('reminders').doc(r.id).update({ triggered: true });
          await db.collection('notifications').add({
            recipientId: uid, senderId: 'system', senderName: 'Reminder',
            category: 'reminder', action: 'due',
            title: r.title || 'Reminder',
            body:  r.notes || 'Your reminder is due.',
            read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          lastFiredKeys.add(firedKey);
          L('Personal reminder fired: ' + (r.title || r.id));
        } catch (e) {
          L('Personal reminder fire error: ' + e.message);
        }
      }
    }

    // ══════════════════════════════════════════════════════════════════════
    // PRODUCT CAMPAIGN EXPIRY — local settings, Firestore at trigger time
    // ══════════════════════════════════════════════════════════════════════
    async function checkProductCampaigns(uid, now) {
      var pcr = userSettings.productCampaignReminder || { enabled: true, leadDays: 2, time: '09:00', bossScope: 'mine' };
      if (pcr.enabled === false) return;

      var parts = (pcr.time || '09:00').split(':');
      var todayAtTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(parts[0]) || 0, parseInt(parts[1]) || 0, 0, 0);
      if (now < todayAtTime) return;

      var leadDays = pcr.leadDays != null ? pcr.leadDays : 2;

      // Check if already ran today
      var dailyKey = 'prodcamp-check-' + now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();
      if (lastFiredKeys.has(dailyKey)) return;

      L('Product campaign check due — fetching from Firestore');

      // Permission filtering — scope TL/PCTL query by ownerId to cut reads
      var allowedBrandIds = null;
      if (currentRole === 'tl' || currentRole === 'pctl') {
        var brandSnap = await db.collection('brands').where('ownerId', '==', uid).get();
        allowedBrandIds = new Set();
        brandSnap.docs.forEach(function(d) { allowedBrandIds.add(d.id); });
      } else if (currentRole === 'apc' || currentRole === 'ipc') {
        var brandSnap2 = await db.collection('brands').get();
        allowedBrandIds = new Set();
        brandSnap2.docs.forEach(function(d) {
          var assigned = (d.data().assignedUsers || []).some(function(u) { return u.id === uid; });
          if (assigned) allowedBrandIds.add(d.id);
        });
      }

      var pcSnap = await db.collection('productCampaigns').get();
      L('ProductCampaign: found ' + pcSnap.docs.length + ' docs');

      // First pass: collect all products with expiring promos
      var allExpiring = []; // { productName, brandName, expiringPromos, currentFinal, priceAfterExpiry }
      var todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);

      for (var p = 0; p < pcSnap.docs.length; p++) {
        var prodDoc = pcSnap.docs[p];
        var product = prodDoc.data();

        if (allowedBrandIds && !allowedBrandIds.has(product.brandId)) continue;

        var promos = product.promotions || [];
        var expiringPromos = [];

        for (var pr = 0; pr < promos.length; pr++) {
          var promo = promos[pr];
          if (promo.status !== 'active' || !promo.endDate) continue;
          var dateParts = promo.endDate.split('-');
          var endMidnight = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]), 0, 0, 0, 0);
          var daysLeft = Math.round((endMidnight - todayMidnight) / 86400000);
          if (daysLeft >= 0 && daysLeft <= leadDays) {
            expiringPromos.push({ name: promo.name || promo.type || 'Promotion', discount: promo.discount || 0, daysLeft: daysLeft });
          }
        }

        if (expiringPromos.length === 0) continue;

        var retailPrice = product.retailPrice || 0;
        var totalActiveDiscount = 0;
        for (var rd = 0; rd < promos.length; rd++) {
          if (promos[rd].status === 'active') totalActiveDiscount += (promos[rd].discount || 0);
        }
        var currentFinal = Math.max(0, retailPrice - totalActiveDiscount);
        var expiringDiscount = 0;
        for (var ed = 0; ed < expiringPromos.length; ed++) { expiringDiscount += expiringPromos[ed].discount; }

        allExpiring.push({
          productName: product.productName || 'Product',
          brandName: product.brandName || '',
          brandId: product.brandId || '',
          expiringPromos: expiringPromos,
          currentFinal: currentFinal,
          priceAfterExpiry: currentFinal + expiringDiscount,
          expiringDiscount: expiringDiscount,
        });
      }

      if (allExpiring.length === 0) { lastFiredKeys.add(dailyKey); return; }

      // One fired key for all product campaigns per day
      var firedKey = 'prodcamp-all-' + now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();
      if (lastFiredKeys.has(firedKey)) { lastFiredKeys.add(dailyKey); return; }

      var title, body;

      if (allExpiring.length === 1) {
        // Single product — detailed notification
        var item = allExpiring[0];
        var promoNames = item.expiringPromos.map(function(ep) { return ep.name; }).join(', ');
        var soonest = item.expiringPromos.reduce(function(min, ep) { return ep.daysLeft < min ? ep.daysLeft : min; }, Infinity);

        if (item.expiringPromos.length === 1) {
          title = item.productName + ' — ' + promoNames + (soonest === 0 ? ' expiring today' : ' ending in ' + soonest + ' day' + (soonest > 1 ? 's' : ''));
        } else {
          title = item.productName + ' — ' + item.expiringPromos.length + ' promotions' + (soonest === 0 ? ' expiring today' : ' ending soon');
        }
        body = promoNames + ' (−$' + item.expiringDiscount.toFixed(2) + ') ending soon. Price will increase from $' + item.currentFinal.toFixed(2) + ' to $' + item.priceAfterExpiry.toFixed(2) + '.';
      } else {
        // Multiple products — combined notification
        var totalPromos = allExpiring.reduce(function(sum, item) { return sum + item.expiringPromos.length; }, 0);
        title = totalPromos + ' promotion' + (totalPromos > 1 ? 's' : '') + ' ending soon across ' + allExpiring.length + ' products';
        var details = allExpiring.map(function(item) {
          return item.productName + ': $' + item.currentFinal.toFixed(2) + ' → $' + item.priceAfterExpiry.toFixed(2);
        }).join(' | ');
        body = details;
      }

      await db.collection('notifications').add({
        recipientId: uid, senderId: 'system', senderName: 'Product Tracker',
        category: 'product_campaign', action: 'expiring',
        title: title, body: body,
        read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      lastFiredKeys.add(firedKey);
      L('Product campaign notification: ' + allExpiring.length + ' products, ' + title);
      lastFiredKeys.add(dailyKey);
    }

    // ══════════════════════════════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════════════════════════════
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function prevOccurrence(category, sched, now) {
      var parts = (sched.time || '00:00').split(':');
      var h = parseInt(parts[0]) || 0;
      var m = parseInt(parts[1]) || 0;
      if (category === 'daily') {
        var c = new Date(now); c.setHours(h, m, 0, 0);
        if (c > now) c.setDate(c.getDate() - 1);
        return c;
      }
      if (category === 'weekly') {
        var dow = sched.dayOfWeek != null ? sched.dayOfWeek : 1;
        var cur = now.getDay();
        var back = (cur - dow + 7) % 7;
        var c = new Date(now); c.setDate(now.getDate() - back); c.setHours(h, m, 0, 0);
        if (c > now) c.setDate(c.getDate() - 7);
        return c;
      }
      if (category === 'monthly') {
        var dom = sched.dayOfMonth != null ? sched.dayOfMonth : 1;
        var c = new Date(now); c.setDate(dom); c.setHours(h, m, 0, 0);
        if (c > now) c.setMonth(c.getMonth() - 1);
        return c;
      }
      return null;
    }

    function nextOccurrence(category, sched, now) {
      var parts = (sched.time || '00:00').split(':');
      var h = parseInt(parts[0]) || 0;
      var m = parseInt(parts[1]) || 0;
      if (category === 'daily') {
        var c = new Date(now); c.setHours(h, m, 0, 0);
        if (c <= now) c.setDate(c.getDate() + 1);
        return c;
      }
      if (category === 'weekly') {
        var dow = sched.dayOfWeek != null ? sched.dayOfWeek : 1;
        var cur = now.getDay();
        var ahead = (dow - cur + 7) % 7;
        if (ahead === 0) {
          var same = new Date(now); same.setHours(h, m, 0, 0);
          if (same <= now) ahead = 7;
        }
        var c = new Date(now); c.setDate(now.getDate() + ahead); c.setHours(h, m, 0, 0);
        return c;
      }
      if (category === 'monthly') {
        var dom = sched.dayOfMonth != null ? sched.dayOfMonth : 1;
        var c = new Date(now); c.setDate(dom); c.setHours(h, m, 0, 0);
        if (c <= now) c.setMonth(c.getMonth() + 1);
        return c;
      }
      return null;
    }

    // ── Cleanup ────────────────────────────────────────────────────────────
    function stopAll() {
      if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
      if (schedulerInterval) { clearInterval(schedulerInterval); schedulerInterval = null; }
      Object.values(snoozedTimers).forEach(function(t) { clearTimeout(t); });
      snoozedTimers = {};
      lastFiredKeys.clear();
    }

    // ── IPC handlers ───────────────────────────────────────────────────────
    window.agent.onMarkRead(function(notifId) {
      db.collection('notifications').doc(notifId).update({ read: true }).catch(function(err) {
        console.error('Failed to mark read:', err);
      });
    });

    window.agent.onSnoozeRequest(function(data) {
      var notifId = data.notifId;
      var minutes = data.minutes;
      if (snoozedTimers[notifId]) clearTimeout(snoozedTimers[notifId]);
      snoozedTimers[notifId] = setTimeout(async function() {
        delete snoozedTimers[notifId];
        try {
          var snap = await db.collection('notifications').doc(notifId).get();
          if (snap.exists && !snap.data().read) {
            var d = snap.data();
            window.agent.showNotification({
              id: snap.id, title: d.title || 'Snoozed', body: d.body || '',
              category: d.category || 'task', senderName: d.senderName || '',
              createdAt: d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().getTime() : Date.now(),
              snoozed: true,
            });
          }
        } catch(err) {}
      }, minutes * 60 * 1000);
    });
  </script>
